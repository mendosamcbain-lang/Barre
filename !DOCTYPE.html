<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
margin:0;
background:transparent;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
font-family:sans-serif;
}

.controls{
margin-bottom:20px;
}

.container{
height:340px;
width:70px;
border-radius:35px;
background:rgba(200,200,200,0.15);
overflow:hidden;
position:relative;
}

.bar{

position:absolute;
bottom:0;
width:100%;
height:0%;

background:linear-gradient(
to top,
#0a1f5c,
#123a9c,
#3f8cff,
#79c8ff,
#2ecc71
);

transition:height 1s linear;

}

.pulse{
animation:pulseGlow 1.2s infinite;
}

@keyframes pulseGlow{

0%{
filter:brightness(1);
}

50%{
filter:brightness(1.5);
}

100%{
filter:brightness(1);
}

}

button{

margin-left:6px;
padding:6px 14px;
border:none;
border-radius:6px;
background:#2c2c2c;
color:white;
cursor:pointer;

}

button:hover{
background:#444;
}

input{
padding:4px;
}

</style>

</head>

<body>

<div class="controls">

<input type="time" id="targetTime">

<button onclick="startTimer()">Démarrer</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="container">
<div class="bar" id="bar"></div>
</div>

<script>

let startTime
let targetTime
let duration
let timer=null

function startTimer(){

let input=document.getElementById("targetTime").value

if(!input) return

let now=new Date()

let target=new Date()

let parts=input.split(":")

target.setHours(parts[0])
target.setMinutes(parts[1])
target.setSeconds(0)

if(target <= now){

alert("Choisir une heure future")

return
}

startTime=now
targetTime=target

duration=targetTime-startTime

clearInterval(timer)

timer=setInterval(updateBar,200)

}

function stopTimer(){

clearInterval(timer)

}

function resetTimer(){

clearInterval(timer)

document.getElementById("bar").style.height="0%"
document.getElementById("bar").classList.remove("pulse")

}

function updateBar(){

let now=new Date()

let elapsed=now-startTime

let percent=(elapsed/duration)*100

if(percent>=100){

percent=100
clearInterval(timer)

}

let bar=document.getElementById("bar")

bar.style.height=percent+"%"

if(percent>92){

bar.classList.add("pulse")

}

}

</script>

</body>
</html>
